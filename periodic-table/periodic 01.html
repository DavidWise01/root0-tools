<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elements 1–118 — Weight Stacks</title>
<style>
:root{
  --bg:#050507;
  --panel:#0e0f13;
  --text:#e8e9ed;
  --muted:#9aa0a6;
  --gold:#e4c276;
  --gold-dim:rgba(228,194,118,0.2);
  --s:#7dd3fc;
  --p:#c084fc;
  --d:#2dd4bf;
  --f:#fbbf24;
  --border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
  background-image:
    radial-gradient(1200px 800px at 80% -10%, rgba(228,194,118,0.08), transparent 60%),
    radial-gradient(800px 600px at 10% 110%, rgba(125,211,252,0.06), transparent 50%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  padding:28px 20px 14px;
  text-align:center;
  border-bottom:1px solid var(--border);
  background:linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
}
h1{
  font-weight:300;
  font-size:clamp(22px,3.2vw,34px);
  letter-spacing:0.02em;
  color:#f1f2f4;
}
h1 span{
  color:var(--gold);
  font-weight:400;
}
main{
  flex:1;
  display:flex;
  gap:24px;
  padding:24px;
  max-width:1800px;
  margin:0 auto;
  width:100%;
  align-items:flex-start;
}
.table-wrap{
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:8px;
  scrollbar-color:var(--gold-dim) transparent;
}
.table-wrap::-webkit-scrollbar{height:8px}
.table-wrap::-webkit-scrollbar-track{background:transparent}
.table-wrap::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}
#periodic-table{
  display:grid;
  grid-template-columns:repeat(18, minmax(54px, 1fr));
  grid-template-rows:repeat(7, minmax(60px, auto)) 20px repeat(2, minmax(60px, auto));
  gap:6px;
  min-width:1080px;
  padding:12px;
  position:relative;
}
.element{
  position:relative;
  background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 4px 4px;
  cursor:pointer;
  transition:all 0.2s ease;
  aspect-ratio:1/1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow:hidden;
}
.element::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:2px;
  opacity:0.9;
}
.element.s::before{background:var(--s);box-shadow:0 0 12px rgba(125,211,252,0.4)}
.element.p::before{background:var(--p);box-shadow:0 0 12px rgba(192,132,252,0.35)}
.element.d::before{background:var(--d);box-shadow:0 0 12px rgba(45,212,191,0.35)}
.element.f::before{background:var(--f);box-shadow:0 0 12px rgba(251,191,36,0.4)}
.element:hover{
  transform:translateY(-3px) scale(1.03);
  background:rgba(255,255,255,0.07);
  border-color:rgba(228,194,118,0.4);
  z-index:10;
  box-shadow:0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(228,194,118,0.2) inset;
}
.element .num{
  position:absolute;
  top:3px;left:5px;
  font-size:10px;
  color:var(--muted);
  font-weight:500;
}
.element .sym{
  font-size:20px;
  font-weight:600;
  text-align:center;
  margin-top:10px;
  letter-spacing:0.02em;
  color:#fff;
  text-shadow:0 0 10px rgba(255,255,255,0.15);
}
.element .name{
  font-size:9px;
  text-align:center;
  color:var(--muted);
  margin-top:-2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding:0 2px;
}
.element .weight{
  font-size:9px;
  text-align:center;
  color:#b8bcc2;
  opacity:0.8;
  font-variant-numeric:tabular-nums;
}
.element.dim{
  opacity:0.18;
  filter:grayscale(0.7) brightness(0.6);
  transform:none !important;
}
.element.highlight{
  outline:2px solid var(--gold);
  outline-offset:1px;
  background:linear-gradient(180deg, rgba(228,194,118,0.18), rgba(228,194,118,0.06));
  z-index:5;
  box-shadow:0 0 20px rgba(228,194,118,0.25);
}
.placeholder{
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px dashed var(--gold-dim);
  border-radius:10px;
  color:var(--gold);
  font-size:11px;
  background:rgba(228,194,118,0.04);
  letter-spacing:0.03em;
}
aside.panel{
  width:340px;
  flex-shrink:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  position:sticky;
  top:24px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
.panel h3{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--gold);
  margin-bottom:12px;
  font-weight:600;
}
.key{
  margin-bottom:24px;
}
.key-buttons{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.key-buttons button{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 12px;
  border-radius:10px;
  text-align:left;
  font-size:13px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1.3;
}
.key-buttons button:hover{
  background:rgba(228,194,118,0.1);
  border-color:var(--gold-dim);
  transform:translateX(2px);
}
.key-buttons button.active{
  background:rgba(228,194,118,0.15);
  border-color:var(--gold);
  color:var(--gold);
}
.legend{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:16px 0 22px;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
}
.dot{
  width:10px;height:10px;border-radius:3px;
}
.dot.s{background:var(--s);box-shadow:0 0 8px rgba(125,211,252,0.5)}
.dot.p{background:var(--p);box-shadow:0 0 8px rgba(192,132,252,0.5)}
.dot.d{background:var(--d);box-shadow:0 0 8px rgba(45,212,191,0.5)}
.dot.f{background:var(--f);box-shadow:0 0 8px rgba(251,191,36,0.5)}
.filter{
  padding-top:18px;
  border-top:1px solid var(--border);
}
.slider-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}
.slider-row label{
  font-size:11px;
  color:var(--muted);
  width:28px;
}
input[type="range"]{
  flex:1;
  -webkit-appearance:none;
  height:4px;
  background:linear-gradient(to right, var(--gold), var(--gold-dim));
  border-radius:2px;
  outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--gold);
  border:2px solid #000;
  box-shadow:0 0 8px rgba(228,194,118,0.6);
  cursor:pointer;
}
#wlabel{
  text-align:center;
  font-size:12px;
  color:var(--gold);
  margin-top:6px;
  font-variant-numeric:tabular-nums;
}
.controls{
  display:flex;
  gap:8px;
  margin-top:14px;
}
.controls button{
  flex:1;
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  padding:8px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
}
.controls button:hover{
  border-color:var(--gold-dim);
  color:var(--text);
}
footer{
  padding:16px 20px 24px;
  text-align:center;
  font-size:12px;
  color:#7c818a;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.3);
}
footer code{
  color:var(--gold);
  background:rgba(228,194,118,0.1);
  padding:2px 6px;
  border-radius:4px;
  font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
}
#tooltip{
  position:fixed;
  pointer-events:none;
  background:rgba(8,9,12,0.94);
  border:1px solid rgba(228,194,118,0.35);
  padding:10px 12px;
  border-radius:10px;
  font-size:12px;
  line-height:1.5;
  opacity:0;
  transition:opacity 0.15s;
  z-index:1000;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  max-width:220px;
}
#tooltip strong{
  color:var(--gold);
  font-size:13px;
}
#tooltip .meta{
  color:var(--muted);
  font-size:11px;
  margin-top:4px;
}
@media (max-width:1100px){
  main{flex-direction:column}
  aside.panel{
    width:100%;
    position:relative;
    top:0;
  }
  #periodic-table{min-width:900px;grid-template-columns:repeat(18, minmax(46px,1fr));gap:4px}
  .element .sym{font-size:17px}
}
</style>
</head>

const table = document.getElementById('periodic-table');
const tooltip = document.getElementById('tooltip');

elements.forEach(el=>{
  const p = pos[el.num];
  const div = document.createElement('div');
  div.className = `element ${el.block}`;
  div.style.gridColumn = p.c;
  div.style.gridRow = p.r;
  div.dataset.num = el.num;
  div.dataset.weight = el.weight;
  div.innerHTML = `<span class="num">${el.num}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span><span class="weight">${el.weight}</span>`;
  
  div.addEventListener('mouseenter', e=>{
    tooltip.innerHTML = `<strong>${el.num}. ${el.name} (${el.sym})</strong><br>Atomic weight: ${el.weight}<div class="meta">${el.block}-block • Period ${p.r>7?p.r-2:p.r}</div>`;
    tooltip.style.opacity = 1;
  });
  div.addEventListener('mousemove', e=>{
    const x = Math.min(window.innerWidth-240, e.clientX+14);
    const y = Math.min(window.innerHeight-100, e.clientY+14);
    tooltip.style.left = x+'px';
    tooltip.style.top = y+'px';
  });
  div.addEventListener('mouseleave', ()=>{tooltip.style.opacity=0;});
  
  table.appendChild(div);
});

// placeholders
function addPH(c,r,t){
  const d=document.createElement('div');
  d.className='placeholder';
  d.style.gridColumn=c;
  d.style.gridRow=r;
  d.textContent=t;
  table.appendChild(d);
}
addPH(3,6,'57-71');
addPH(3,7,'89-103');

// analogy buttons
document.querySelectorAll('.key-buttons button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.key-buttons button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    clearHighlights();
    const ranges = btn.dataset.r.split('|');
    ranges.forEach(range=>{
      const [a,b]=range.split(',').map(Number);
      document.querySelectorAll('.element').forEach(el=>{
        const n=+el.dataset.num;
        if(n>=a && n<=b) el.classList.add('highlight');
      });
    });
    // dim others
    document.querySelectorAll('.element').forEach(el=>{
      if(!el.classList.contains('highlight')) el.classList.add('dim');
    });
  });
});

function clearHighlights(){
  document.querySelectorAll('.element').forEach(el=>{
    el.classList.remove('highlight','dim');
  });
}

// weight filter
const wmin = document.getElementById('wmin');
const wmax = document.getElementById('wmax');
const wlabel = document.getElementById('wlabel');

function updateWeight(){
  let min = parseFloat(wmin.value);
  let max = parseFloat(wmax.value);
  if(min>max){[min,max]=[max,min];}
  wlabel.textContent = `${min.toFixed(1)} – ${max.toFixed(1)}`;
  document.querySelectorAll('.element').forEach(el=>{
    const w = parseFloat(el.dataset.weight);
    if(w>=min && w<=max){
      el.classList.remove('dim');
    }else{
      el.classList.add('dim');
    }
  });
  clearHighlights();
}
wmin.addEventListener('input', updateWeight);
wmax.addEventListener('input', updateWeight);

document.getElementById('reset').addEventListener('click', ()=>{
  wmin.value=1; wmax.value=294; updateWeight();
  document.querySelectorAll('.key-buttons button').forEach(b=>b.classList.remove('active'));
});
document.getElementById('clear').addEventListener('click', ()=>{
  clearHighlights();
  document.querySelectorAll('.key-buttons button').forEach(b=>b.classList.remove('active'));
  updateWeight();
});

// initial
updateWeight();
