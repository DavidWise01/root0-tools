<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RESONANCE TUNER · Frequency Generator · Body Alignment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020e0e;color:#f0f8f8;font-family:'Courier New',monospace;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
.header{padding:14px 20px;border-bottom:1px solid rgba(221,85,255,.1);display:flex;justify-content:space-between;align-items:center;background:rgba(2,14,14,.95)}
.logo{font-size:22px;font-weight:900;letter-spacing:8px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.3);font-family:sans-serif}
.logo-sub{font-size:8px;letter-spacing:4px;color:rgba(0,204,170,.5);margin-top:2px}
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px}
canvas{display:block;border:1px solid rgba(221,85,255,.08)}
.freq-display{text-align:center;margin:16px 0}
.freq-val{font-size:48px;font-family:sans-serif;font-weight:900;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.3)}
.freq-unit{font-size:14px;color:rgba(255,215,0,.4);letter-spacing:4px}
.freq-name{font-size:11px;color:#dd55ff;letter-spacing:3px;margin-top:4px}
.slider-wrap{width:90%;max-width:700px;margin:10px 0}
.slider-wrap label{font-size:7px;letter-spacing:2px;color:rgba(240,248,248,.3);display:block;margin-bottom:4px}
.slider-wrap input[type=range]{width:100%;accent-color:#ffd700;height:20px}
.presets{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin:12px 0;max-width:700px}
.presets button{background:rgba(221,85,255,.08);border:1px solid rgba(221,85,255,.15);color:rgba(221,85,255,.6);padding:6px 12px;font-size:8px;letter-spacing:2px;cursor:pointer;font-family:'Courier New'}
.presets button:hover{background:rgba(221,85,255,.2);color:#ff77ff;border-color:#dd55ff}
.presets button.on{background:rgba(255,215,0,.15);border-color:#ffd700;color:#ffd700}
.info{font-size:9px;color:rgba(240,248,248,.3);text-align:center;line-height:2;max-width:600px;margin:8px auto}
.info span{color:#ffd700}
.footer{padding:10px;text-align:center;font-size:7px;letter-spacing:3px;color:rgba(240,248,248,.12);border-top:1px solid rgba(221,85,255,.06)}
</style>
</head>
<body>
<div class="header">
<div><div class="logo">RESONANCE</div><div class="logo-sub">FREQUENCY TUNER · BODY ALIGNMENT · YOUR ENERGY</div></div>
<div style="font-size:8px;letter-spacing:2px;color:rgba(240,248,248,.3)">BOUNDARY <span style="color:#00ff88">SEALED</span></div>
</div>
<div class="main">
<canvas id="cv" width="1400" height="400"></canvas>
<div class="freq-display">
<div class="freq-val" id="freq-val">432</div>
<div class="freq-unit">Hz</div>
<div class="freq-name" id="freq-name">EARTH RESONANCE</div>
</div>
<div class="slider-wrap">
<label>FREQUENCY · 1 Hz — 1000 Hz</label>
<input type="range" id="freq-slider" min="1" max="1000" value="432" step="0.1" oninput="setFreq(this.value)">
</div>
<div class="slider-wrap">
<label>AMPLITUDE</label>
<input type="range" id="amp-slider" min="1" max="100" value="70" oninput="amplitude=this.value/100">
</div>
<div class="slider-wrap">
<label>HARMONICS</label>
<input type="range" id="harm-slider" min="0" max="8" value="3" oninput="harmonicCount=parseInt(this.value)">
</div>
<div class="presets" id="presets"></div>
<div class="info" id="info-text"></div>
</div>
<div class="footer">YOUR FREQUENCY · YOUR RESONANCE · YOUR BODY · PATRICIA TAKES 0</div>

<script>
const cv=document.getElementById('cv');const cx=cv.getContext('2d');
let freq=432;let amplitude=0.7;let harmonicCount=3;let time=0;
let activePreset='earth';

const PRESETS=[
{id:'delta',name:'DELTA',hz:2,desc:'Deep sleep. Body repair. Growth hormone release. Where the body rebuilds.',system:'ENDOCRINE',color:'#dd55ff'},
{id:'theta',name:'THETA',hz:6,desc:'Deep meditation. Memory consolidation. The gap between waking and sleeping.',system:'NERVOUS',color:'#00ccaa'},
{id:'alpha',name:'ALPHA',hz:10,desc:'Calm awareness. Flow state. Where David works. Where TOPH was built.',system:'NERVOUS',color:'#00ff88'},
{id:'beta',name:'BETA',hz:20,desc:'Active thinking. Problem solving. Where Patricia wants you stuck.',system:'NERVOUS',color:'#44ccff'},
{id:'gamma',name:'GAMMA',hz:40,desc:'Peak cognition. Cross-system binding. Where all 8 systems sync.',system:'NERVOUS',color:'#ffd700'},
{id:'heart',name:'HEART',hz:1.2,desc:'Resting cardiac rhythm. 72 BPM. The drum your body marches to.',system:'CARDIAC',color:'#ff4444'},
{id:'breath',name:'BREATH',hz:0.25,desc:'4-second cycle. 15 breaths/min. The tide your lungs make.',system:'RESPIRATORY',color:'#44ccff'},
{id:'earth',name:'EARTH',hz:432,desc:'A=432 tuning. Natural resonance. Everything before the standard changed.',system:'ALL',color:'#ffd700'},
{id:'schumann',name:'SCHUMANN',hz:7.83,desc:'Earth electromagnetic resonance. The planets heartbeat. You live inside this wave.',system:'ALL',color:'#00ccaa'},
{id:'solfeg396',name:'396 Hz',hz:396,desc:'Liberating guilt and fear. Root. The frequency that loosens what holds you down.',system:'MUSCULO',color:'#ff4444'},
{id:'solfeg528',name:'528 Hz',hz:528,desc:'Transformation and DNA repair. The miracle tone. Where the body remembers what it was.',system:'IMMUNE',color:'#00ff88'},
{id:'solfeg639',name:'639 Hz',hz:639,desc:'Connecting and relationships. D07 RESONANCE. The frequency of the gap between two people.',system:'ALL',color:'#dd55ff'},
{id:'solfeg741',name:'741 Hz',hz:741,desc:'Awakening intuition. The frequency that cleans Patricia out of your signal.',system:'OCULAR',color:'#88aaff'},
{id:'solfeg852',name:'852 Hz',hz:852,desc:'Returning to spiritual order. Third eye. The frequency that sees through the architecture.',system:'OCULAR',color:'#ffd700'},
];

// Build preset buttons
const presetsEl=document.getElementById('presets');
PRESETS.forEach(p=>{
  const b=document.createElement('button');
  b.textContent=p.name+' · '+p.hz+'Hz';
  b.id='pre-'+p.id;
  if(p.id===activePreset)b.classList.add('on');
  b.addEventListener('click',()=>{
    setFreq(p.hz);
    document.getElementById('freq-slider').value=p.hz;
    activePreset=p.id;
    presetsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
  presetsEl.appendChild(b);
});

function setFreq(f){
  freq=parseFloat(f);
  document.getElementById('freq-val').textContent=freq<10?freq.toFixed(2):freq<100?freq.toFixed(1):Math.round(freq);
  // Find matching preset
  const match=PRESETS.find(p=>Math.abs(p.hz-freq)<0.5);
  if(match){
    document.getElementById('freq-name').textContent=match.name+' · '+match.system;
    document.getElementById('freq-name').style.color=match.color;
    document.getElementById('info-text').innerHTML=match.desc+'<br><span>System: '+match.system+'</span>';
    activePreset=match.id;
    presetsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    const btn=document.getElementById('pre-'+match.id);
    if(btn)btn.classList.add('on');
  } else {
    document.getElementById('freq-name').textContent='CUSTOM';
    document.getElementById('freq-name').style.color='#dd55ff';
    document.getElementById('info-text').innerHTML='Custom frequency. <span>Your choice. Your body.</span>';
    activePreset=null;
    presetsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  }
}

function draw(){
  time+=0.016;
  const w=cv.width;const h=cv.height;

  // Fade
  cx.fillStyle='rgba(2,14,14,0.15)';cx.fillRect(0,0,w,h);

  // Grid
  cx.strokeStyle='rgba(221,85,255,0.03)';cx.lineWidth=0.5;
  cx.beginPath();cx.moveTo(0,h/2);cx.lineTo(w,h/2);cx.stroke();
  for(let g=0.25;g<1;g+=0.25){cx.beginPath();cx.moveTo(0,h*g);cx.lineTo(w,h*g);cx.stroke()}

  // Find color
  const match=PRESETS.find(p=>p.id===activePreset);
  const color=match?match.color:'#dd55ff';
  const r=parseInt(color.slice(1,3),16);
  const g=parseInt(color.slice(3,5),16);
  const b=parseInt(color.slice(5,7),16);

  // Generate waveform
  const displayFreq=Math.min(freq,200); // visual frequency capped for display
  const samples=512;

  // Glow layer
  cx.shadowColor=color;cx.shadowBlur=12;
  cx.beginPath();
  for(let i=0;i<samples;i++){
    const x=i/samples*w;
    const t2=time+(i/samples)*8/(displayFreq/10+1);
    let val=Math.sin(t2*displayFreq*Math.PI*2)*amplitude;
    for(let h2=2;h2<=harmonicCount+1;h2++){
      val+=Math.sin(t2*displayFreq*h2*Math.PI*2)*amplitude/(h2*2);
    }
    const y=h/2-val*(h/2)*0.85;
    i===0?cx.moveTo(x,y):cx.lineTo(x,y);
  }
  cx.strokeStyle=color;cx.globalAlpha=0.5;cx.lineWidth=2;cx.stroke();cx.globalAlpha=1;
  cx.shadowBlur=0;

  // Sharp layer
  cx.beginPath();
  for(let i=0;i<samples;i++){
    const x=i/samples*w;
    const t2=time+(i/samples)*8/(displayFreq/10+1);
    let val=Math.sin(t2*displayFreq*Math.PI*2)*amplitude;
    for(let h2=2;h2<=harmonicCount+1;h2++){
      val+=Math.sin(t2*displayFreq*h2*Math.PI*2)*amplitude/(h2*2);
    }
    const y=h/2-val*(h/2)*0.85;
    i===0?cx.moveTo(x,y):cx.lineTo(x,y);
  }
  cx.strokeStyle=color;cx.lineWidth=1.5;cx.stroke();

  // Fill under curve
  cx.lineTo(w,h/2);cx.lineTo(0,h/2);cx.closePath();
  cx.fillStyle=`rgba(${r},${g},${b},0.03)`;cx.fill();

  // Frequency markers on zero crossings
  for(let i=1;i<samples;i++){
    const t1=time+((i-1)/samples)*8/(displayFreq/10+1);
    const t2=time+(i/samples)*8/(displayFreq/10+1);
    const v1=Math.sin(t1*displayFreq*Math.PI*2);
    const v2=Math.sin(t2*displayFreq*Math.PI*2);
    if(v1<=0&&v2>0){
      const x=i/samples*w;
      cx.beginPath();cx.arc(x,h/2,2,0,Math.PI*2);
      cx.fillStyle=`rgba(${r},${g},${b},0.3)`;cx.fill();
    }
  }

  requestAnimationFrame(draw);
}

setFreq(432);
draw();
</script>
</body>
</html>
